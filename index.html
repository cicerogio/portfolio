        // Lazy load content after hero is visible
        function loadContent() {
            const lazyDiv = document.getElementById('lazy-content');
            lazyDiv.innerHTML = lazyContent;
            lazyDiv.classList.add('loaded');

            // Add remaining CSS
            const style = document.createElement('style');
            style.textContent = remainingCSS;
            document.head.appendChild(style);
        }

        // Use intersection observer for better performance
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    loadContent();
                    observer.disconnect();
                }
            });
        });

        // Start observing when hero is 50% visible
        const hero = document.querySelector('.hero');
        observer.observe(hero);

        // Smooth scrolling for navigation
        document.addEventListener('click', function(e) {
            if (e.target.matches('a[href^="#"]')) {
                e.preventDefault();
                const target = document.querySelector(e.target.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            }
        });

        // Debounce scroll events
        let ticking = false;
        function updateScrollPos() {
            // Add scroll-based animations here if needed
            ticking = false;
        }

        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(updateScrollPos);
                ticking = true;
            }
        });
